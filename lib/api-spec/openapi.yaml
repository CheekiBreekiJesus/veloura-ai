openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Short-lived token issuance for caller identity verification
  - name: analysis
    description: AI face analysis operations

# ── Security ────────────────────────────────────────────────────────────────
# POST /api/analyze requires a Bearer token obtained from GET /api/auth/token.
# Tokens are short-lived (10 min) HMAC-SHA256-signed blobs. Callers must
# complete the two-step flow: fetch a token, then send it on the analyze call.
components:
  securitySchemes:
    analyzeToken:
      type: http
      scheme: bearer
      description: >
        Short-lived token issued by GET /api/auth/token.
        Expires in 10 minutes. Present as `Authorization: Bearer <token>`.

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AuthTokenResponse:
      type: object
      properties:
        token:
          type: string
          description: Short-lived HMAC-signed token (valid for 10 minutes)
        expiresIn:
          type: integer
          description: Seconds until the token expires
      required:
        - token
        - expiresIn
    AnalyzeFaceRequest:
      type: object
      properties:
        imageBase64:
          type: string
          description: >
            Base64-encoded image data. Maximum ~6 MB of base64 chars
            (~4.5 MB binary). Accepted MIME types: image/jpeg, image/png,
            image/webp, image/gif, image/heic, image/heif.
        mimeType:
          type: string
          description: MIME type of the image (e.g., image/jpeg)
      required:
        - imageBase64
        - mimeType
    SkinConcerns:
      type: object
      properties:
        acne:
          type: string
          enum: [none, mild, moderate, severe]
        redness:
          type: string
          enum: [none, mild, moderate, severe]
        dryness:
          type: string
          enum: [none, mild, moderate, severe]
      required:
        - acne
        - redness
        - dryness
    AnalysisResult:
      type: object
      properties:
        # ── Core features (always present) ───────────────────────────────
        face_shape:
          type: string
          description: "oval, round, square, heart, diamond, oblong"
        skin_tone:
          type: string
        undertone:
          type: string
          description: "warm, cool, neutral"
        eye_shape:
          type: string
        lip_shape:
          type: string
        hair_type:
          type: string
        style_archetype:
          type: string
        color_palette:
          type: array
          items:
            type: string
          description: 5-8 hex color codes
        beauty_recommendations:
          type: array
          items:
            type: string
        fashion_recommendations:
          type: array
          items:
            type: string
        hairstyle_suggestions:
          type: array
          items:
            type: string
        glasses_suggestions:
          type: array
          items:
            type: string
        # ── Extended face structure ───────────────────────────────────────
        jawline_definition:
          type: string
          enum: [soft, medium, sharp]
        cheekbone_prominence:
          type: string
          enum: [low, medium, high]
        facial_symmetry_score:
          type: number
          minimum: 0
          maximum: 1
        # ── Extended skin analysis ────────────────────────────────────────
        skin_tone_category:
          type: string
          enum: [very_light, light, medium, tan, deep]
        skin_evenness:
          type: string
          enum: [low, medium, high]
        skin_concerns:
          $ref: "#/components/schemas/SkinConcerns"
        # ── Color profile ─────────────────────────────────────────────────
        contrast_level:
          type: string
          enum: [low, medium, high]
        color_families:
          type: array
          items:
            type: string
        # ── Hair profile ──────────────────────────────────────────────────
        hair_lengths:
          type: array
          items:
            type: string
        recommended_style_direction:
          type: string
        # ── Accessories ───────────────────────────────────────────────────
        earring_styles:
          type: array
          items:
            type: string
        necklace_lengths:
          type: array
          items:
            type: string
        # ── Aesthetic archetypes ──────────────────────────────────────────
        aesthetic_archetypes:
          type: array
          items:
            type: string
        # ── Recommendation seeds ──────────────────────────────────────────
        skincare_focus:
          type: array
          items:
            type: string
        makeup_direction:
          type: string
        fashion_direction:
          type: string
        shopping_keywords:
          type: array
          items:
            type: string
      required:
        - face_shape
        - skin_tone
        - undertone
        - eye_shape
        - lip_shape
        - hair_type
        - style_archetype
        - color_palette
        - beauty_recommendations
        - fashion_recommendations
        - hairstyle_suggestions
        - glasses_suggestions
        - jawline_definition
        - cheekbone_prominence
        - facial_symmetry_score
        - skin_tone_category
        - skin_evenness
        - skin_concerns
        - contrast_level
        - color_families
        - hair_lengths
        - recommended_style_direction
        - earring_styles
        - necklace_lengths
        - aesthetic_archetypes
        - skincare_focus
        - makeup_direction
        - fashion_direction
        - shopping_keywords
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/token:
    get:
      operationId: getAnalyzeToken
      tags: [auth]
      summary: Issue a short-lived analyze token
      description: >
        Returns a 10-minute HMAC-signed token that authorizes a call to
        POST /api/analyze. Clients must call this endpoint before each
        analysis session and present the returned token as a Bearer credential.
        Rate-limited to 20 requests per IP per 15-minute window.
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "429":
          description: Too many token requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analyze:
    post:
      operationId: analyzeFace
      tags: [analysis]
      summary: Analyze face from image
      description: >
        Analyzes a selfie using AI vision and returns a full Aesthetic Identity
        Profile. Requires a valid Bearer token from GET /api/auth/token.
        Rate-limited to 10 requests per IP per 15-minute window. Rejected if
        the server has 3 or more concurrent analysis requests in flight.
      security:
        - analyzeToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeFaceRequest"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "400":
          description: Invalid request (missing/bad fields, disallowed MIME type, oversized payload)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid analyze token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Per-IP rate limit exceeded (10 requests / 15 min)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Analysis failed (upstream AI error or parse failure)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Server busy — global concurrency cap reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
