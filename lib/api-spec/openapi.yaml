openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Short-lived token issuance for caller identity verification
  - name: analysis
    description: AI face analysis operations
  - name: studio
    description: Beauty Studio — makeup and hair virtual try-on

# ── Security ────────────────────────────────────────────────────────────────
# POST /api/analyze requires a Bearer token obtained from GET /api/auth/token.
# Tokens are short-lived (10 min) HMAC-SHA256-signed blobs. Callers must
# complete the two-step flow: fetch a token, then send it on the analyze call.
components:
  securitySchemes:
    analyzeToken:
      type: http
      scheme: bearer
      description: >
        Short-lived token issued by GET /api/auth/token.
        Expires in 10 minutes. Present as `Authorization: Bearer <token>`.

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AuthTokenResponse:
      type: object
      properties:
        token:
          type: string
          description: Short-lived HMAC-signed token (valid for 10 minutes)
        expiresIn:
          type: integer
          description: Seconds until the token expires
      required:
        - token
        - expiresIn
    AnalyzeFaceRequest:
      type: object
      properties:
        imageBase64:
          type: string
          description: >
            Base64-encoded image data. Maximum ~6 MB of base64 chars
            (~4.5 MB binary). Accepted MIME types: image/jpeg, image/png,
            image/webp, image/gif, image/heic, image/heif.
        mimeType:
          type: string
          description: MIME type of the image (e.g., image/jpeg)
      required:
        - imageBase64
        - mimeType
    SkinConcerns:
      type: object
      properties:
        acne:
          type: string
          enum: [none, mild, moderate, severe]
        redness:
          type: string
          enum: [none, mild, moderate, severe]
        dryness:
          type: string
          enum: [none, mild, moderate, severe]
        pores:
          type: string
          enum: [none, mild, moderate, severe]
        texture:
          type: string
          enum: [none, mild, moderate, severe]
      required:
        - acne
        - redness
        - dryness
        - pores
        - texture
    AnalysisResult:
      type: object
      properties:
        # ── Core features (always present) ───────────────────────────────
        face_shape:
          type: string
          description: "oval, round, square, heart, diamond, oblong"
        skin_tone:
          type: string
        undertone:
          type: string
          description: "warm, cool, neutral"
        eye_shape:
          type: string
        lip_shape:
          type: string
        hair_type:
          type: string
        style_archetype:
          type: string
        color_palette:
          type: array
          items:
            type: string
          description: 5-8 hex color codes
        beauty_recommendations:
          type: array
          items:
            type: string
        fashion_recommendations:
          type: array
          items:
            type: string
        hairstyle_suggestions:
          type: array
          items:
            type: string
        glasses_suggestions:
          type: array
          items:
            type: string
        # ── Extended face structure ───────────────────────────────────────
        jawline_definition:
          type: string
          enum: [soft, medium, sharp]
        cheekbone_prominence:
          type: string
          enum: [low, medium, high]
        facial_symmetry_score:
          type: number
          minimum: 0
          maximum: 1
        eyebrow_shape:
          type: string
          description: "e.g. Straight, Arched, Feathered, Rounded, Angled"
        nose_shape:
          type: string
          description: "e.g. Soft Button, Refined Straight, Gently Rounded, Aquiline"
        # ── Extended skin analysis ────────────────────────────────────────
        skin_type:
          type: string
          enum: [oily, combination, normal, dry, sensitive]
          description: "Detected skin type category"
        skin_tone_category:
          type: string
          enum: [very_light, light, medium, tan, deep]
        skin_evenness:
          type: string
          enum: [low, medium, high]
        skin_concerns:
          $ref: "#/components/schemas/SkinConcerns"
        # ── Color profile ─────────────────────────────────────────────────
        contrast_level:
          type: string
          enum: [low, medium, high]
        color_families:
          type: array
          items:
            type: string
        # ── Hair profile ──────────────────────────────────────────────────
        hair_lengths:
          type: array
          items:
            type: string
        recommended_style_direction:
          type: string
        # ── Accessories ───────────────────────────────────────────────────
        earring_styles:
          type: array
          items:
            type: string
        necklace_lengths:
          type: array
          items:
            type: string
        # ── Aesthetic archetypes ──────────────────────────────────────────
        aesthetic_archetypes:
          type: array
          items:
            type: string
        # ── Recommendation seeds ──────────────────────────────────────────
        skincare_focus:
          type: array
          items:
            type: string
        makeup_direction:
          type: string
        fashion_direction:
          type: string
        shopping_keywords:
          type: array
          items:
            type: string
        # ── Companion identity ────────────────────────────────────────────────
        companion_name:
          type: string
          description: "AI-generated companion name (4–8 letters, aesthetic-matched)"
        companion_avatar_url:
          type: string
          description: "DALL-E illustrated avatar as a data URI (persists across restarts)"
      required:
        - face_shape
        - skin_tone
        - undertone
        - eye_shape
        - lip_shape
        - hair_type
        - style_archetype
        - color_palette
        - beauty_recommendations
        - fashion_recommendations
        - hairstyle_suggestions
        - glasses_suggestions
        - jawline_definition
        - cheekbone_prominence
        - facial_symmetry_score
        - eyebrow_shape
        - nose_shape
        - skin_tone_category
        - skin_evenness
        - skin_type
        - skin_concerns
        - contrast_level
        - color_families
        - hair_lengths
        - recommended_style_direction
        - earring_styles
        - necklace_lengths
        - aesthetic_archetypes
        - skincare_focus
        - makeup_direction
        - fashion_direction
        - shopping_keywords
    MakeupTryOnRequest:
      type: object
      properties:
        imageBase64:
          type: string
          description: >
            Base64-encoded selfie image. Maximum ~6 MB of base64 chars.
            Accepted MIME types: image/jpeg, image/png, image/webp, image/gif, image/heic, image/heif.
        mimeType:
          type: string
          description: MIME type of the image (e.g. image/jpeg)
        productName:
          type: string
          description: Name of the makeup product (e.g. "Terracotta Eyeshadow Palette")
        productCategory:
          type: string
          description: Product category (always "Makeup")
        productDescription:
          type: string
          description: Full product description used to derive the makeup look
        profile:
          $ref: "#/components/schemas/AnalysisResult"
          description: User's Aesthetic Identity Profile for personalisation context
      required:
        - imageBase64
        - mimeType
        - productName
        - productCategory
        - productDescription
    MakeupPreviewResult:
      type: object
      properties:
        resultImageBase64:
          type: string
          description: Base64-encoded PNG of the AI-generated makeup preview
        mimeType:
          type: string
          description: Always "image/png"
      required:
        - resultImageBase64
        - mimeType
    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required:
        - role
        - content
    ChatRequest:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
          description: Conversation history (max 40 messages, each max 2000 chars)
        profile:
          $ref: "#/components/schemas/AnalysisResult"
          description: The user's Aesthetic Identity Profile for context
        userName:
          type: string
          description: User's first name for personalization
        healthConcerns:
          type: array
          items:
            type: string
          description: >
            User-declared allergies and product preferences (e.g. "Fragrance-free",
            "Nut allergy", "Vegan only"). Aura avoids recommending products that
            conflict with these concerns.
      required:
        - messages
    ChatResponse:
      type: object
      properties:
        message:
          type: string
          description: The AI stylist's reply
      required:
        - message
    RemoveBackgroundRequest:
      type: object
      properties:
        imageBase64:
          type: string
          description: >
            Base64-encoded image data. Maximum ~6 MB of base64 chars.
            Accepted MIME types: image/jpeg, image/png, image/webp.
        mimeType:
          type: string
          description: MIME type of the image (e.g., image/jpeg)
      required:
        - imageBase64
        - mimeType
    RemoveBackgroundResult:
      type: object
      properties:
        imageBase64:
          type: string
          description: Base64-encoded PNG with background removed (transparent)
        mimeType:
          type: string
          description: Always "image/png"
      required:
        - imageBase64
        - mimeType
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/token:
    get:
      operationId: getAnalyzeToken
      tags: [auth]
      summary: Issue a short-lived analyze token
      description: >
        Returns a 10-minute HMAC-signed token that authorizes a call to
        POST /api/analyze. Clients must call this endpoint before each
        analysis session and present the returned token as a Bearer credential.
        Rate-limited to 20 requests per IP per 15-minute window.
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "429":
          description: Too many token requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat:
    post:
      operationId: chatWithStylist
      tags: [analysis]
      summary: Chat with the AI stylist
      description: >
        Send a conversational message to Aura, the personal AI stylist.
        The full conversation history and the user's Aesthetic Identity Profile
        are included so the AI can give deeply personalized advice.
        Requires a valid Bearer token from GET /api/auth/token.
      security:
        - analyzeToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: AI stylist reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid analyze token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: AI stylist temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /makeup-try-on:
    post:
      operationId: makeupTryOn
      tags: [studio]
      summary: Generate an AI makeup try-on preview
      description: >
        Accepts a selfie (base64) and a makeup product descriptor. Uses GPT-4o to
        extract face features, then gpt-image-1 to edit the portrait
        with the requested product applied as makeup. Returns a base64-encoded PNG.
        Requires a valid Bearer token from GET /api/auth/token.
        Rate-limited to 15 requests per IP per 15-minute window.
        Maximum 2 concurrent requests.
      security:
        - analyzeToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MakeupTryOnRequest"
      responses:
        "200":
          description: AI-generated makeup preview image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MakeupPreviewResult"
        "400":
          description: Invalid request (missing fields, unsupported MIME type, oversized payload)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid analyze token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded or server busy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /remove-background:
    post:
      operationId: removeBackground
      tags: [analysis]
      summary: Remove background from a clothing image
      description: >
        Accepts a clothing photo (base64) and returns a background-free PNG with a
        transparent backdrop, suitable for displaying in the wardrobe grid.
        Requires a valid Bearer token from GET /api/auth/token.
        Rate-limited to 30 requests per IP per 15-minute window.
      security:
        - analyzeToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemoveBackgroundRequest"
      responses:
        "200":
          description: Background-removed PNG image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveBackgroundResult"
        "400":
          description: Invalid request (missing fields, unsupported MIME type, oversized payload)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid analyze token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded or server busy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Background removal failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analyze:
    post:
      operationId: analyzeFace
      tags: [analysis]
      summary: Analyze face from image
      description: >
        Analyzes a selfie using AI vision and returns a full Aesthetic Identity
        Profile. Requires a valid Bearer token from GET /api/auth/token.
        Rate-limited to 10 requests per IP per 15-minute window. Rejected if
        the server has 3 or more concurrent analysis requests in flight.
      security:
        - analyzeToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeFaceRequest"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "400":
          description: Invalid request (missing/bad fields, disallowed MIME type, oversized payload)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid analyze token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Per-IP rate limit exceeded (10 requests / 15 min)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Analysis failed (upstream AI error or parse failure)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Server busy — global concurrency cap reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
